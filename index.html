<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#07070E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CUÁNDO">
<meta property="og:title" content="CUÁNDO — Coordina en segundos">
<meta property="og:description" content="¿Cuándo pueden? Elige el horario sin cuentas, sin drama.">
<title>CUÁNDO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════
   TOKENS
═══════════════════════════════════════ */
:root {
  --bg:        #07070E;
  --bg-hero:   radial-gradient(ellipse 80% 50% at 50% -10%, rgba(203,255,0,.08) 0%, transparent 70%);
  --card:      #11111A;
  --elev:      #181824;
  --glass:     rgba(24,24,36,.9);
  --bdr:       rgba(255,255,255,.065);
  --bdr-hi:    rgba(255,255,255,.12);
  --acc:       #CBFF00;
  --acc-dim:   rgba(203,255,0,.07);
  --acc-glow:  rgba(203,255,0,.25);
  --acc-soft:  rgba(203,255,0,.14);
  --txt:       #F0F0EA;
  --txt2:      #8E8E9A;
  --mut:       #4A4A56;
  --grn:       #00E28A;
  --grn-dim:   rgba(0,226,138,.09);
  --grn-glow:  rgba(0,226,138,.22);
  --red:       #FF3B3B;
  --r:         20px;
  --rsm:       13px;
  --rxs:       9px;
  --shadow:    0 24px 64px rgba(0,0,0,.55);
}

/* ═══════════════════════════════════════
   RESET + BASE
═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overscroll-behavior: none; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--txt);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}
button, input { font-family: 'Outfit', sans-serif; }

/* noise grain */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: .035;
}

/* ═══════════════════════════════════════
   SPLASH — Tropix Studio intro
═══════════════════════════════════════ */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  background: #04040A;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  transition: opacity .6s ease, transform .6s cubic-bezier(.25,.46,.45,.94);
}
#splash.exit { opacity: 0; transform: scale(1.07); pointer-events: none; }

.sp-diamond {
  width: 60px; height: 60px;
  margin: 0 auto 24px;
}
.sp-diamond svg { width: 100%; height: 100%; overflow: visible; }
.sp-d-outer {
  stroke-dasharray: 142;
  stroke-dashoffset: 142;
  animation: drawPath .7s cubic-bezier(.4,0,.2,1) .1s forwards;
}
.sp-d-inner {
  stroke-dasharray: 91;
  stroke-dashoffset: 91;
  animation: drawPath .55s cubic-bezier(.4,0,.2,1) .4s forwards;
}
.sp-d-dot {
  opacity: 0;
  animation: spDot .3s ease .85s forwards;
}
@keyframes drawPath { to { stroke-dashoffset: 0; } }
@keyframes spDot { to { opacity: 1; } }

.sp-by {
  font-size: .65rem; letter-spacing: .3em; text-transform: uppercase;
  color: var(--mut); margin-bottom: 10px; text-align: center;
  opacity: 0;
  animation: spFade .45s ease .5s forwards;
}
.sp-name {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800; font-size: 1.85rem; letter-spacing: .2em;
  color: var(--txt); text-align: center;
  /* letters injected via JS */
}
.sp-name span {
  display: inline-block;
  opacity: 0;
  transform: translateY(10px) scale(.9);
}
.sp-rule {
  width: 0; height: 1.5px;
  background: linear-gradient(90deg, transparent, var(--acc), transparent);
  margin: 18px auto 0;
  box-shadow: 0 0 12px var(--acc-glow);
  animation: spRule .45s ease .75s forwards;
}
@keyframes spFade { to { opacity: 1; } }
@keyframes spRule { to { width: 40px; } }

/* ═══════════════════════════════════════
   APP SHELL
═══════════════════════════════════════ */
#app { position: relative; z-index: 1; min-height: 100vh; }
#cc  { position: fixed; inset: 0; z-index: 8000; pointer-events: none; }

.page-anim { animation: pgIn .34s cubic-bezier(.25,.46,.45,.94) both; }
@keyframes pgIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.view { max-width: 500px; margin: 0 auto; padding-bottom: 72px; }

/* ═══════════════════════════════════════
   NAV
═══════════════════════════════════════ */
.nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 20px 0;
}
.wordmark {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800; font-size: 1.3rem; letter-spacing: -.05em;
  background: linear-gradient(135deg, var(--acc), #a8e000);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 14px var(--acc-glow));
}
.lang-pill {
  display: flex; gap: 2px;
  background: var(--elev); border-radius: 999px; padding: 3px;
  border: 1px solid var(--bdr);
}
.lang-btn {
  padding: 5px 12px; border-radius: 999px; border: none;
  background: transparent; font-size: .77rem; font-weight: 600;
  color: var(--mut); cursor: pointer; transition: all .18s;
}
.lang-btn.on { background: var(--card); color: var(--txt); box-shadow: 0 1px 4px rgba(0,0,0,.4); }

.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--txt2); font-size: .875rem; font-weight: 500;
  background: none; border: none; padding: 16px 20px 10px; cursor: pointer;
  transition: color .15s;
}
.back-btn:hover { color: var(--txt); }

/* ═══════════════════════════════════════
   HOME HERO
═══════════════════════════════════════ */
.hero {
  padding: 24px 20px 0;
  min-height: calc(100svh - 56px);
  display: flex; flex-direction: column;
  background: var(--bg-hero);
}

.eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--acc-dim); border: 1px solid rgba(203,255,0,.16);
  border-radius: 999px; padding: 6px 14px;
  font-size: .72rem; font-weight: 600; color: var(--acc); letter-spacing: .05em;
  margin-bottom: 26px; width: fit-content;
  animation: pgIn .4s ease .05s both;
}
.eyebrow-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--acc); box-shadow: 0 0 6px var(--acc-glow);
  animation: blink 2s ease infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

.h1 {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800;
  font-size: clamp(4rem, 17vw, 6.2rem);
  line-height: .88; letter-spacing: -.07em;
  margin-bottom: 20px;
  animation: pgIn .4s ease .1s both;
}
.h1-q { color: var(--acc); text-shadow: 0 0 30px var(--acc-glow); }

.tagline {
  font-size: 1rem; color: var(--txt2); line-height: 1.65;
  margin-bottom: 32px; max-width: 320px;
  animation: pgIn .4s ease .18s both;
}

.hero-cta {
  animation: pgIn .4s ease .25s both;
  margin-bottom: 28px;
}

/* ── LIVE PREVIEW ── */
.live-preview {
  flex: 1;
  animation: pgIn .4s ease .32s both;
  max-height: 280px;
}
.lp-card {
  background: var(--card);
  border: 1px solid var(--bdr-hi);
  border-radius: var(--r);
  padding: 18px;
  box-shadow: var(--shadow), 0 0 0 1px var(--bdr);
  position: relative; overflow: hidden;
}
.lp-card::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 120px; height: 120px;
  background: radial-gradient(circle, var(--acc-glow) 0%, transparent 70%);
}
.lp-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.lp-title {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 700; font-size: .95rem;
}
.lp-live {
  display: flex; align-items: center; gap: 5px;
  font-size: .7rem; font-weight: 600; color: var(--grn); letter-spacing: .04em;
}
.lp-live::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--grn); box-shadow: 0 0 6px var(--grn-glow);
  animation: blink 1.5s ease infinite;
}
.lp-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: 10px; margin-bottom: 8px;
  border: 1px solid var(--bdr);
  transition: all .5s cubic-bezier(.34,1.2,.64,1);
}
.lp-opt.hot {
  border-color: var(--grn);
  background: var(--grn-dim);
  transform: scale(1.01);
  box-shadow: 0 4px 20px var(--grn-glow);
}
.lp-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--bdr-hi); flex-shrink: 0;
  transition: all .4s ease;
}
.lp-opt.hot .lp-dot { background: var(--grn); box-shadow: 0 0 8px var(--grn-glow); }
.lp-opt-lbl { flex: 1; font-size: .85rem; color: var(--txt2); transition: color .3s; }
.lp-opt.hot .lp-opt-lbl { color: var(--txt); font-weight: 500; }
.lp-bar-wrap { flex: 1; height: 4px; background: var(--elev); border-radius: 999px; overflow: hidden; max-width: 80px; }
.lp-bar { height: 100%; border-radius: 999px; background: var(--acc); width: 0; transition: width .7s cubic-bezier(.25,.46,.45,.94); }
.lp-cnt {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 700; font-size: .9rem; color: var(--acc);
  min-width: 18px; text-align: right;
}

/* ── LIVE BADGE ── */
.live-badge {
  margin-top: auto; padding: 20px 0 0;
  display: flex; align-items: center; gap: 10px;
  animation: pgIn .4s ease .42s both;
}
.lbadge-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--grn); box-shadow: 0 0 8px var(--grn);
  flex-shrink: 0; animation: blink 2s ease infinite;
}
.lbadge-txt { font-size: .82rem; color: var(--mut); }
.lbadge-txt strong { color: var(--txt2); }

/* ═══════════════════════════════════════
   PAGE HEADER
═══════════════════════════════════════ */
.pg-head { padding: 4px 20px 22px; }
.pg-title {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800; font-size: 1.95rem; letter-spacing: -.04em;
  line-height: 1.1; margin-bottom: 6px;
}
.pg-sub { font-size: .9375rem; color: var(--txt2); line-height: 1.55; }

/* step bar */
.step-bar { display: flex; gap: 5px; padding: 4px 20px 18px; }
.step-seg {
  height: 3px; border-radius: 999px;
  background: var(--bdr-hi); flex: 1;
  transition: all .35s ease;
}
.step-seg.on { background: var(--acc); flex: 2.5; box-shadow: 0 0 8px var(--acc-glow); }

/* ═══════════════════════════════════════
   SECTION
═══════════════════════════════════════ */
.sec { padding: 0 20px; }

.sec-label {
  font-size: .68rem; font-weight: 600; color: var(--mut);
  text-transform: uppercase; letter-spacing: .1em;
  margin-bottom: 10px; margin-top: 20px;
}

/* ═══════════════════════════════════════
   CARD
═══════════════════════════════════════ */
.card {
  background: var(--card); border: 1px solid var(--bdr);
  border-radius: var(--r); padding: 20px; margin-bottom: 12px;
}

/* ═══════════════════════════════════════
   INPUTS
═══════════════════════════════════════ */
.inp-grp { margin-bottom: 16px; }
label {
  display: block; font-size: .7rem; font-weight: 600;
  color: var(--mut); text-transform: uppercase; letter-spacing: .1em;
  margin-bottom: 8px;
}
input[type=text], input[type=date], input[type=time] {
  width: 100%; padding: 15px 16px;
  border: 1.5px solid var(--bdr-hi);
  border-radius: var(--rsm);
  font-size: 1rem; color: var(--txt);
  background: var(--elev);
  outline: none;
  transition: border-color .18s, box-shadow .18s;
  -webkit-appearance: none; appearance: none;
  color-scheme: dark;
}
input:focus {
  border-color: var(--acc);
  box-shadow: 0 0 0 3px var(--acc-dim);
}
input::placeholder { color: var(--mut); }

/* ═══════════════════════════════════════
   SLOT BUILDER
═══════════════════════════════════════ */
.slot {
  background: var(--elev); border: 1px solid var(--bdr);
  border-radius: var(--rsm); padding: 14px; margin-bottom: 10px;
  animation: pgIn .25s ease both;
  transition: border-color .18s;
}
.slot:focus-within { border-color: var(--bdr-hi); }
.slot-num {
  font-size: .68rem; font-weight: 700; color: var(--acc);
  letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px;
}
.slot-row { display: flex; gap: 8px; align-items: center; }
.slot-row input { flex: 1; padding: 12px 14px; font-size: .9375rem; }

.btn-del {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid var(--bdr); background: transparent;
  color: var(--mut); cursor: pointer; font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .15s;
}
.btn-del:hover { border-color: var(--red); color: var(--red); }

.btn-add-slot {
  width: 100%; padding: 13px;
  border: 1.5px dashed rgba(203,255,0,.2);
  border-radius: var(--rsm);
  background: var(--acc-dim); color: var(--acc);
  font-weight: 600; font-size: .9375rem; cursor: pointer;
  transition: all .18s; margin-top: 2px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-add-slot:hover { background: var(--acc-soft); border-color: rgba(203,255,0,.35); }
.btn-add-slot:disabled { opacity: .35; cursor: not-allowed; }

/* ═══════════════════════════════════════
   BUTTONS
═══════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 9px;
  padding: 16px 28px; border-radius: 999px;
  font-size: 1rem; font-weight: 600; cursor: pointer; border: none;
  transition: all .2s ease; width: 100%; line-height: 1;
  position: relative; overflow: hidden; white-space: nowrap;
}
.btn:disabled { opacity: .6; cursor: not-allowed; transform: none !important; }

/* PRIMARY — lime with shimmer */
.btn-primary {
  background: var(--acc); color: #07070E;
}
.btn-primary::after {
  content: '';
  position: absolute; top: 0; left: -80%;
  width: 55%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
  animation: shimmer 2.8s ease infinite;
  pointer-events: none;
}
@keyframes shimmer { to { left: 180%; } }
.btn-primary:hover {
  background: #DAFF20;
  transform: translateY(-2px);
  box-shadow: 0 10px 32px var(--acc-glow);
}
.btn-primary:active { transform: translateY(0); box-shadow: none; }

/* GHOST / OUTLINE */
.btn-outline {
  background: transparent; color: var(--txt);
  border: 1px solid var(--bdr-hi);
}
.btn-outline:hover { background: var(--elev); }
.btn-ghost {
  background: transparent; color: var(--txt2);
  padding: 14px; font-size: .9rem; border: none;
}
.btn-ghost:hover { color: var(--txt); }

/* WHATSAPP */
.btn-wa { background: #25D366; color: #fff; }
.btn-wa:hover { background: #1fc55e; }

/* COPY button inline */
.btn-copy {
  background: var(--acc); color: #07070E; border: none;
  padding: 7px 14px; border-radius: var(--rxs);
  font-family: 'Outfit', sans-serif; font-size: .78rem; font-weight: 700;
  cursor: pointer; flex-shrink: 0; transition: all .18s; white-space: nowrap;
}
.btn-copy:hover { background: #DAFF20; }
.btn-copy.copied { background: var(--grn); color: #07070E; }

/* SPINNER on button */
.btn-spinner {
  width: 18px; height: 18px;
  border: 2.5px solid rgba(7,7,14,.25);
  border-top-color: #07070E;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  display: inline-block;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════
   OPTION CARDS (respond)
═══════════════════════════════════════ */
.opt-card {
  background: var(--card); border: 1.5px solid var(--bdr);
  border-radius: var(--rsm); padding: 16px 18px; margin-bottom: 10px;
  cursor: pointer; display: flex; align-items: center; gap: 14px;
  transition: border-color .22s, background .22s,
              transform .25s cubic-bezier(.34,1.56,.64,1),
              box-shadow .22s;
  user-select: none; -webkit-user-select: none;
}
.opt-card:active { transform: scale(.975); }
.opt-card.sel {
  border-color: var(--grn); background: var(--grn-dim);
  transform: scale(1.015);
  box-shadow: 0 6px 28px var(--grn-glow);
}
.opt-ring {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid var(--bdr-hi); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all .22s; color: transparent; font-size: .75rem;
}
.opt-card.sel .opt-ring {
  border-color: var(--grn); background: var(--grn);
  color: #07070E;
  animation: ringPop .3s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes ringPop { 0%{transform:scale(.6)} 100%{transform:scale(1)} }
.opt-label { font-weight: 600; font-size: 1rem; color: var(--txt); line-height: 1.25; }

/* ═══════════════════════════════════════
   LINK BOX
═══════════════════════════════════════ */
.link-box {
  background: var(--acc-dim); border: 1px solid rgba(203,255,0,.16);
  border-radius: var(--rsm); padding: 13px 16px;
  display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
}
.link-text {
  flex: 1; font-size: .82rem; color: var(--acc); font-weight: 500;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ═══════════════════════════════════════
   SHARE HERO
═══════════════════════════════════════ */
.share-hero { text-align: center; padding: 28px 20px 22px; }
.share-emoji {
  font-size: 4rem; display: block; margin-bottom: 14px;
  animation: bounceIn .55s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes bounceIn { 0%{opacity:0;transform:scale(.5)} 100%{opacity:1;transform:scale(1)} }

/* ═══════════════════════════════════════
   RESULTS
═══════════════════════════════════════ */
.best-card {
  background: linear-gradient(135deg, #141E00, #0C1600);
  border-radius: var(--r); padding: 24px; margin-bottom: 18px;
  position: relative; overflow: hidden;
  animation: bounceIn .5s cubic-bezier(.34,1.56,.64,1) both;
}
/* animated dashed border */
.best-card::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: var(--r);
  border: 1px solid rgba(203,255,0,.25);
}
.best-card::after {
  content: '';
  position: absolute; top: -60px; right: -60px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, var(--acc-glow) 0%, transparent 70%);
}
.best-eyebrow {
  font-size: .68rem; font-weight: 700; color: var(--acc);
  text-transform: uppercase; letter-spacing: .12em;
  margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
}
.best-eyebrow::before { content: '✦'; }
.best-date {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800; font-size: 1.6rem; letter-spacing: -.03em;
  color: var(--txt); line-height: 1.15; margin-bottom: 10px;
}
.best-count { font-size: .9375rem; color: var(--txt2); }
.best-names { font-size: .82rem; color: var(--mut); margin-top: 5px; }

.res-row { padding: 14px 0; border-bottom: 1px solid var(--bdr); }
.res-row:last-child { border-bottom: none; }
.res-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 9px;
}
.res-date { font-weight: 600; font-size: .95rem; }
.res-count {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 700; font-size: 1.1rem; color: var(--acc);
}
.res-track { height: 3px; background: var(--elev); border-radius: 999px; overflow: hidden; }
.res-fill { height: 100%; border-radius: 999px; background: var(--acc); width: 0; transition: width .75s cubic-bezier(.25,.46,.45,.94); }
.res-names { font-size: .8rem; color: var(--mut); margin-top: 7px; line-height: 1.4; }

/* ═══════════════════════════════════════
   INVITE (respond top)
═══════════════════════════════════════ */
.invite-card {

// ── CONFETTI ─────────────────────────────────
function launchConfetti() {
  const c = document.getElementById('cc');
  if (!c) return;
  const ctx = c.getContext('2d');
  c.width = innerWidth; c.height = innerHeight;
  const colors = ['#CBFF00','#F0F0EA','#00E28A','#FF3B3B','#8B5CF6','#38BDF8'];
  const particles = Array.from({length: 100}, () => ({
    x:  Math.random() * c.width,
    y: -20 - Math.random() * 80,
    w:  Math.random() * 10 + 4,
    h:  Math.random() * 16 + 6,
    r:  Math.random() * 360,
    rs: (Math.random() - .5) * 8,
    vx: (Math.random() - .5) * 5,
    vy: Math.random() * 4 + 2,
    g:  .1 + Math.random() * .12,
    col: colors[Math.floor(Math.random() * colors.length)]
  }));
  let raf;
  function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    particles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.r * Math.PI / 180);
      ctx.fillStyle = p.col;
      ctx.globalAlpha = Math.max(0, 1 - p.y / (c.height * .88));
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
      p.x += p.vx; p.y += p.vy; p.vy += p.g; p.r += p.rs;
    });
    if (particles.some(p => p.y < c.height + 100)) raf = requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, c.width, c.height);
  }
  draw();
  setTimeout(() => { cancelAnimationFrame(raf); ctx.clearRect(0, 0, c.width, c.height); }, 5000);
}

  const opts = document.querySelectorAll('.lp-opt');

  if (!opts.length) return;
  const targets = [90, 32, 60];
  const seq     = [0, 2, 1];
  const totals  = [3, 1, 2];

  function cycle() {
    opts.forEach(o => o.classList.remove('hot'));
    bars.forEach(b => { b.style.transition = 'none'; b.style.width = '0%'; });
    cnts.forEach(c => c.textContent = '0');
    seq.forEach((idx, step) => {
      setTimeout(() => {
        opts[idx].classList.add('hot');
        setTimeout(() => {
          bars[idx].style.transition = 'width .75s cubic-bezier(.25,.46,.45,.94)';
          bars[idx].style.width = targets[idx] + '%';
          countUp(cnts[idx], totals[idx], 700);
        }, 80);
      }, step * 750);
    });
  }

  cycle();
  _pvLoop = setInterval(cycle, 4800);
}

function fmt(date, time) {
  if (!date) return time || '';

  if (time) {
    const [h, m] = time.split(':');
    const hr = parseInt(h);
    s += ` · ${hr%12||12}:${m} ${hr >= 12 ? 'PM' : 'AM'}`;

  return s;
}

function countUp(el, target, dur = 700) {
  const start = Date.now();
  const tick = () => {
    const p = Math.min((Date.now() - start) / dur, 1);
    const e = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(e * target);
    if (p < 1) requestAnimationFrame(tick);
    else el.textContent = target;
  };
  tick();
}

    ta.value = url; document.body.appendChild(ta); ta.select();

// ═══════════════════════════════════════════
// VIEW: CREATE
// ═══════════════════════════════════════════
function initCreate() {
  _slots = [{ id: uid(), date: '', time: '' }, { id: uid(), date: '', time: '' }];
  go('create');
}

function viewCreate() {
  if (!_slots.length) initCreate();
  return `
  ${navBar()}
  <button class="back-btn" onclick="go('')">${t('back')}</button>
  <div class="step-bar"><div class="step-seg on"></div><div class="step-seg on"></div><div class="step-seg on"></div></div>
  <div class="pg-head">
    <div class="pg-title">${t('create_title')}</div>
    <div class="pg-sub">${t('create_sub')}</div>
  </div>
  <div class="sec">
    ${!isDB ? `<div class="cfg-warn">${t('cfg')}</div>` : ''}
    <div id="create-err"></div>
    <div class="inp-grp">
      <label>${ICO.dia} ${t('p_label')}</label>
      <input type="text" id="inp-title" placeholder="${t('p_ph')}" maxlength="80">
    </div>
    <div class="inp-grp">
      <label>${t('n_label')}</label>
      <input type="text" id="inp-name" placeholder="${t('n_ph')}" maxlength="40">
    </div>
    <div class="inp-grp">
      <label>${ICO.clk} ${t('o_label')}</label>
      <div id="slots-container">${_slots.map((s, i) => slotHTML(s, i)).join('')}</div>
      <button class="btn-add-slot" id="add-slot-btn" onclick="addSlot()" ${_slots.length >= 6 ? 'disabled' : ''}>
        ${ICO.plus} ${t('add_opt')}
      </button>
    </div>
    <div style="height:14px"></div>
    <button class="btn btn-primary" id="gen-btn" onclick="createPlan()">${ICO.clk} ${t('gen_btn')}</button>
  </div>
  <div class="powered" style="margin-top:32px">${t('powered')}</div>`;
}

function slotHTML(s, idx) {
  return `<div class="slot" id="slot-${s.id}">
    <div class="slot-num">${t('slot_n')(idx + 1)}</div>
    <div class="slot-row">
      <input type="date" value="${s.date}" oninput="updateSlot('${s.id}','date',this.value)">
      <input type="time" value="${s.time}" oninput="updateSlot('${s.id}','time',this.value)">
      ${_slots.length > 2 ? `<button class="btn-del" onclick="removeSlot('${s.id}')">×</button>` : ''}
    </div>
  </div>`;
}

function addSlot() {
  if (_slots.length >= 6) return;
  const s = { id: uid(), date: '', time: '' };
  _slots.push(s);
  const idx = _slots.length - 1;
  document.getElementById('slots-container').insertAdjacentHTML('beforeend', slotHTML(s, idx));
  if (_slots.length >= 6) {
    const btn = document.getElementById('add-slot-btn');
    if (btn) btn.disabled = true;
  }
}

function removeSlot(id) {
  _slots = _slots.filter(s => s.id !== id);
  document.getElementById('slot-' + id)?.remove();
  document.querySelectorAll('.slot-num').forEach((el, i) => el.textContent = t('slot_n')(i + 1));
  const btn = document.getElementById('add-slot-btn');
  if (btn) btn.disabled = false;
  if (_slots.length <= 2) document.querySelectorAll('.btn-del').forEach(b => b.remove());
}

function updateSlot(id, field, value) {
  const s = _slots.find(s => s.id === id);
  if (s) s[field] = value;
}

async function createPlan() {
  const title   = document.getElementById('inp-title')?.value.trim();
  const creator = document.getElementById('inp-name')?.value.trim();
  const errEl   = document.getElementById('create-err');
  const btn     = document.getElementById('gen-btn');
  if (errEl) errEl.innerHTML = '';

  if (!title || !creator) {
    if (errEl) errEl.innerHTML = `<div class="err-msg">${t('e_fields')}</div>`;
    return;
  }
  const valid = _slots.filter(s => s.date && s.time);
  if (valid.length < 2) {
    if (errEl) errEl.innerHTML = `<div class="err-msg">${t('e_slots')}</div>`;
    return;
  }

  // loading state
  if (btn) { btn.innerHTML = '<span class="btn-spinner"></span>'; btn.disabled = true; }

  const payload = {
    title, creator_name: creator,
    options: valid.map(s => ({ id: s.id, date: s.date, time: s.time }))
  };

  // DEMO MODE
  if (!isDB) {
    await new Promise(r => setTimeout(r, 600)); // fake latency
    const id = 'demo-' + uid();
    sessionStorage.setItem('p:' + id, JSON.stringify({ ...payload, id }));
    _slots = [];
    go('share/' + id);
    return;
  }

  try {
    const { data, error } = await db.from('plans').insert(payload).select().single();
    if (error) throw error;
    _slots = [];
    go('share/' + data.id);
  } catch(e) {
    console.error(e);
    if (btn) { btn.innerHTML = `${ICO.clk} ${t('gen_btn')}`; btn.disabled = false; }
    if (errEl) errEl.innerHTML = `<div class="err-msg">${t('e_save')}</div>`;
  }
}

// ═══════════════════════════════════════════

// ═══════════════════════════════════════════
// VIEW: RESPOND
// ═══════════════════════════════════════════
async function viewRespond(id) {
  _plan = await getPlan(id);
  _sel  = new Set();
  const initial = _plan.creator_name.charAt(0).toUpperCase();
  return `
  ${navBar()}
  <div class="sec">
    <div class="invite-card">
      <div class="invite-avatar">${initial}</div>
      <div>
        <div class="invite-from">${_plan.creator_name} ${t('inv_from')}</div>
        <div class="invite-plan">${_plan.title}</div>
      </div>
    </div>
    <div class="pg-title">${t('resp_title')}</div>
    <div class="pg-sub" style="margin-bottom:20px">${t('resp_sub')}</div>
    <div id="resp-err"></div>
    ${_plan.options.map(o => `
      <div class="opt-card" data-id="${o.id}" onclick="toggleOption('${o.id}',this)">
        <div class="opt-ring">${ICO.chk}</div>
        <div class="opt-label">${fmt(o.date, o.time)}</div>
      </div>`).join('')}
    <div class="inp-grp" style="margin-top:24px">
      <label>${t('n_label')}</label>
      <input type="text" id="resp-name" placeholder="${t('n_ph')}" maxlength="40">
    </div>
    <button class="btn btn-primary" id="confirm-btn" onclick="submitResponse()">
      ${ICO.chk} ${t('confirm_btn')}
    </button>
  </div>
  <div class="powered" style="margin-top:32px">${t('powered')}</div>`;
}

function toggleOption(id, el) {
  haptic();
  _sel.has(id) ? _sel.delete(id) : _sel.add(id);
  el.classList.toggle('sel', _sel.has(id));
}

async function submitResponse() {
  const name  = document.getElementById('resp-name')?.value.trim();
  const errEl = document.getElementById('resp-err');
  const btn   = document.getElementById('confirm-btn');
  if (errEl) errEl.innerHTML = '';

  if (!name) {
    if (errEl) errEl.innerHTML = `<div class="err-msg">${t('e_fields')}</div>`;
    return;
  }

  if (btn) { btn.innerHTML = '<span class="btn-spinner"></span>'; btn.disabled = true; }

  const data = { plan_id: _plan.id, name, selected: [..._sel] };

  // DEMO
  if (_plan.id.startsWith('demo-')) {
    await new Promise(r => setTimeout(r, 500));
    const arr = JSON.parse(sessionStorage.getItem('r:' + _plan.id) || '[]');
    arr.push(data);
    sessionStorage.setItem('r:' + _plan.id, JSON.stringify(arr));
    showToast(t('saved'));
    setTimeout(() => go('results/' + _plan.id), 1000);
    return;
  }

  try {
    const { error } = await db.from('responses').insert(data);
    if (error) throw error;
    showToast(t('saved'));
    setTimeout(() => go('results/' + _plan.id), 1000);
  } catch(e) {
    console.error(e);
    if (btn) { btn.innerHTML = `${ICO.chk} ${t('confirm_btn')}`; btn.disabled = false; }
    if (errEl) errEl.innerHTML = `<div class="err-msg">${t('e_save')}</div>`;
  }
}

// ═══════════════════════════════════════════
// VIEW: RESULTS
// ═══════════════════════════════════════════
async function viewResults(id) {
  _plan = await getPlan(id);
  let responses;

  if (id.startsWith('demo-')) {
    responses = JSON.parse(sessionStorage.getItem('r:' + id) || '[]');
  } else {
    const { data, error } = await db.from('responses').select('*').eq('plan_id', id).order('created_at');
    if (error) throw error;
    responses = data || [];
  }

  const counts = {}, names = {};
  _plan.options.forEach(o => { counts[o.id] = 0; names[o.id] = []; });
  responses.forEach(r => (r.selected || []).forEach(x => {
    if (counts[x] !== undefined) { counts[x]++; names[x].push(r.name); }
  }));

  const sorted  = [..._plan.options].sort((a, b) => counts[b.id] - counts[a.id]);
  const best    = sorted[0];
  const maxCnt  = Math.max(...Object.values(counts), 1);
  const planLink= `${base()}#plan/${id}`;
  const hasBest = responses.length > 0 && counts[best?.id] > 0;

  if (hasBest) setTimeout(launchConfetti, 500);

  // auto refresh
  if (!id.startsWith('demo-') && isDB) {
    _ri = setInterval(() => loadAsync(() => viewResults(id)), 14000);
  }

  return `
  ${navBar()}
  <button class="back-btn" onclick="go('')">${t('back')}</button>
  <div class="sec">
    <div class="pg-title">${_plan.title}</div>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
      <span style="font-size:.85rem;color:var(--mut)">${responses.length} ${t('n_resp')}</span>
      <button onclick="loadAsync(()=>viewResults('${id}'))"
        style="background:none;border:none;color:var(--acc);font-size:.85rem;font-weight:600;cursor:pointer;padding:0;display:flex;align-items:center;gap:5px">
        ${ICO.clk} ${t('refresh')}
      </button>
    </div>

    ${responses.length === 0 ? `
      <div style="text-align:center;padding:52px 20px">
        <div style="font-size:3.5rem;margin-bottom:16px;opacity:.5">🕐</div>
        <div style="color:var(--txt2);margin-bottom:22px">${t('no_res')}</div>
        <button class="btn btn-wa" style="max-width:300px" onclick="waShare('${planLink}')">${ICO.wa} ${t('wa_btn')}</button>
      </div>
    ` : `
      ${hasBest ? `
        <div class="best-card">
          <div class="best-eyebrow">${t('best_lbl')}</div>
          <div class="best-date">${fmt(best.date, best.time)}</div>
          <div class="best-count">${t('n_ppl')(counts[best.id])}</div>
          ${names[best.id].length ? `<div class="best-names">${names[best.id].join(' · ')}</div>` : ''}
        </div>
      ` : ''}

      <div class="sec-label">${t('all_slots')}</div>
      <div class="card">
        ${sorted.map(o => `
          <div class="res-row">
            <div class="res-top">
              <div class="res-date">${fmt(o.date, o.time)}</div>
              <div class="res-count" data-countup="${counts[o.id]}">0</div>
            </div>
            <div class="res-track">
              <div class="res-fill" data-w="${Math.round(counts[o.id]/maxCnt*100)}%"></div>
            </div>
            ${names[o.id].length ? `<div class="res-names">${names[o.id].join(' · ')}</div>` : ''}
          </div>`).join('')}
      </div>
    `}

    <div style="height:12px"></div>
    <button class="btn btn-wa" onclick="waShare('${planLink}')" style="margin-bottom:10px">
      ${ICO.wa} ${t('share_again')}
    </button>
    <button class="btn btn-outline" onclick="initCreate()">${t('create_more')}</button>
  </div>
  <div class="powered" style="margin-top:32px">${t('powered')}</div>`;
}

// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
async function getPlan(id) {
  if (id.startsWith('demo-')) {
    const raw = sessionStorage.getItem('p:' + id);
    if (!raw) throw new Error('not found');
    return JSON.parse(raw);
  }
  if (!isDB) throw new Error('not configured');
  const { data, error } = await db.from('plans').select('*').eq('id', id).single();
  if (error) throw error;
  return data;
}
</script>
