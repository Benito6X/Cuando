<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#07070E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CUÁNDO">
<meta property="og:title" content="CUÁNDO — Coordina en segundos">
<meta property="og:description" content="¿Cuándo pueden? Sin cuentas, sin drama.">
<meta property="og:image" content="img/og.png">
<title>CUÁNDO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────── */
:root{
  --bg:#07070E; --card:#11111A; --elev:#181824;
  --bdr:rgba(255,255,255,.065); --bdr-hi:rgba(255,255,255,.12);
  --acc:#CBFF00; --acc-dim:rgba(203,255,0,.07); --acc-glow:rgba(203,255,0,.25); --acc-soft:rgba(203,255,0,.14);
  --txt:#F0F0EA; --txt2:#8E8E9A; --mut:#4A4A56;
  --grn:#00E28A; --grn-dim:rgba(0,226,138,.09); --grn-glow:rgba(0,226,138,.22);
  --red:#FF3B3B; --r:20px; --rsm:13px; --rxs:9px;
  --shadow:0 24px 64px rgba(0,0,0,.55);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
button,input{font-family:'Outfit',sans-serif}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.032}

/* ── SPLASH ────────────────────────── */
#splash{
  position:fixed;inset:0;z-index:9999;background:#04040A;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0;
  transition:opacity .6s ease,transform .6s cubic-bezier(.25,.46,.45,.94);
}
#splash.exit{opacity:0;transform:scale(1.06);pointer-events:none}

.sp-logo{
  width:80px;height:80px;margin:0 auto 20px;
  opacity:0;transform:scale(.6) translateY(12px);
  animation:spLogoIn .7s cubic-bezier(.34,1.56,.64,1) .2s forwards;
  filter:drop-shadow(0 0 20px rgba(203,255,0,.4));
}
.sp-logo img{width:100%;height:100%;object-fit:contain;border-radius:18px}

.sp-logo-fallback{
  width:80px;height:80px;margin:0 auto 20px;
  opacity:0;transform:scale(.6);
  animation:spLogoIn .7s cubic-bezier(.34,1.56,.64,1) .2s forwards;
  display:none;
}
@keyframes spLogoIn{to{opacity:1;transform:scale(1) translateY(0)}}

.sp-by{
  font-size:.63rem;letter-spacing:.3em;text-transform:uppercase;
  color:var(--mut);margin-bottom:10px;text-align:center;
  opacity:0;animation:spFd .45s ease .55s forwards;
}
.sp-nm{
  font-family:'Bricolage Grotesque',sans-serif;
  font-weight:800;font-size:1.8rem;letter-spacing:.18em;
  color:var(--txt);text-align:center;
}
.sp-rule{
  width:0;height:1.5px;
  background:linear-gradient(90deg,transparent,var(--acc),transparent);
  margin:16px auto 0;
  box-shadow:0 0 12px var(--acc-glow);
  animation:spRule .4s ease .8s forwards;
}
@keyframes spFd{to{opacity:1}}
@keyframes spRule{to{width:40px}}
@keyframes spLetter{to{opacity:1;transform:translateY(0) scale(1)}}

/* ── APP ───────────────────────────── */
#app{position:relative;z-index:1;min-height:100vh}
#cc{position:fixed;inset:0;z-index:8000;pointer-events:none}
.page-anim{animation:pgIn .32s cubic-bezier(.25,.46,.45,.94) both}
@keyframes pgIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.view{max-width:500px;margin:0 auto;padding-bottom:80px}

.sa1{animation:pgIn .38s ease .05s both}
.sa2{animation:pgIn .38s ease .12s both}
.sa3{animation:pgIn .38s ease .19s both}
.sa4{animation:pgIn .38s ease .26s both}
.sa5{animation:pgIn .38s ease .33s both}
.sa6{animation:pgIn .38s ease .4s both}

/* ── NAV ───────────────────────────── */
.nav{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 0}
.wordmark{
  font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:-.05em;
  background:linear-gradient(135deg,var(--acc),#a8e000);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 12px var(--acc-glow));
  display:flex;align-items:center;gap:8px;
}
.nav-icon{width:26px;height:26px;border-radius:7px;object-fit:contain;flex-shrink:0;display:block}
.lang-pill{display:flex;gap:2px;background:var(--elev);border-radius:999px;padding:3px;border:1px solid var(--bdr)}
.lang-btn{padding:5px 12px;border-radius:999px;border:none;background:transparent;font-size:.77rem;font-weight:600;color:var(--mut);cursor:pointer;transition:all .18s}
.lang-btn.on{background:var(--card);color:var(--txt);box-shadow:0 1px 4px rgba(0,0,0,.4)}

.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--txt2);font-size:.875rem;font-weight:500;background:none;border:none;padding:14px 20px 10px;cursor:pointer;transition:color .15s}
.back-btn:hover{color:var(--txt)}

/* ── HERO ──────────────────────────── */
.hero{
  position:relative;overflow:hidden;
  padding:24px 20px 0;
  min-height:calc(100svh - 56px);
  display:flex;flex-direction:column;
}
.hero::before{
  content:'';position:absolute;top:-80px;left:50%;
  transform:translateX(-50%);
  width:380px;height:280px;
  background:radial-gradient(ellipse,rgba(203,255,0,.1) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

.hero-bg{
  position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;
}
.hero-bg img,.hero-bg video{
  width:100%;height:100%;object-fit:cover;
  opacity:.14;filter:saturate(.5) blur(1px);
  transition:opacity 1s ease;
}
.hero-bg-ph{
  position:absolute;inset:0;
  background:
    repeating-linear-gradient(45deg,rgba(203,255,0,.015) 0px,rgba(203,255,0,.015) 1px,transparent 1px,transparent 24px),
    repeating-linear-gradient(-45deg,rgba(203,255,0,.015) 0px,rgba(203,255,0,.015) 1px,transparent 1px,transparent 24px);
}
.hero-content{position:relative;z-index:1;display:flex;flex-direction:column;flex:1}

.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--acc-dim);border:1px solid rgba(203,255,0,.16);
  border-radius:999px;padding:6px 14px;
  font-size:.72rem;font-weight:600;color:var(--acc);letter-spacing:.05em;
  margin-bottom:24px;width:fit-content;
}
.eyebrow-dot{width:6px;height:6px;border-radius:50%;background:var(--acc);box-shadow:0 0 6px var(--acc-glow);animation:blink 2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

.h1{
  font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
  font-size:clamp(3.8rem,16vw,6rem);line-height:.88;letter-spacing:-.07em;
  margin-bottom:18px;
}
.h1-q{color:var(--acc);text-shadow:0 0 32px var(--acc-glow)}

.tagline{font-size:1rem;color:var(--txt2);line-height:1.65;margin-bottom:28px;max-width:320px}

.hero-cta{margin-bottom:24px}

/* ── LIVE PREVIEW ──────────────────── */
.lp-wrap{flex:1;max-height:260px}
.lp-card{
  background:var(--card);border:1px solid var(--bdr-hi);border-radius:var(--r);
  padding:18px;box-shadow:var(--shadow),0 0 0 1px var(--bdr);
  position:relative;overflow:hidden;
}
.lp-card::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:120px;height:120px;
  background:radial-gradient(circle,var(--acc-glow) 0%,transparent 70%);
  pointer-events:none;
}
.lp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.lp-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:.95rem}
.lp-live{display:flex;align-items:center;gap:5px;font-size:.7rem;font-weight:600;color:var(--grn);letter-spacing:.04em}
.lp-live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--grn);box-shadow:0 0 6px var(--grn-glow);animation:blink 1.5s ease infinite}
.lp-opt{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:10px;margin-bottom:7px;
  border:1px solid var(--bdr);
  transition:all .55s cubic-bezier(.34,1.2,.64,1);
}
.lp-opt.hot{border-color:var(--grn);background:var(--grn-dim);transform:scale(1.01);box-shadow:0 4px 20px var(--grn-glow)}
.lp-dot{width:8px;height:8px;border-radius:50%;background:var(--bdr-hi);flex-shrink:0;transition:all .4s ease}
.lp-opt.hot .lp-dot{background:var(--grn);box-shadow:0 0 8px var(--grn-glow)}
.lp-lbl{flex:1;font-size:.85rem;color:var(--txt2);transition:color .3s}
.lp-opt.hot .lp-lbl{color:var(--txt);font-weight:500}
.lp-bw{flex:1;height:4px;background:var(--elev);border-radius:999px;overflow:hidden;max-width:72px}
.lp-b{height:100%;border-radius:999px;background:var(--acc);width:0;transition:width .72s cubic-bezier(.25,.46,.45,.94)}
.lp-cnt{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:.9rem;color:var(--acc);min-width:16px;text-align:right}

.live-badge{margin-top:auto;padding:18px 0 0;display:flex;align-items:center;gap:10px}
.lb-dot{width:7px;height:7px;border-radius:50%;background:var(--grn);box-shadow:0 0 8px var(--grn);flex-shrink:0;animation:blink 2s ease infinite}
.lb-txt{font-size:.82rem;color:var(--mut)}
.lb-txt strong{color:var(--txt2)}

/* ── HOW IT WORKS ──────────────────── */
.how-section{padding:32px 20px 0}
.how-title{
  font-family:'Bricolage Grotesque',sans-serif;font-weight:700;
  font-size:1.45rem;letter-spacing:-.03em;margin-bottom:20px;
}
.how-steps{display:flex;flex-direction:column;gap:14px}
.how-step{
  display:flex;align-items:flex-start;gap:14px;
  background:var(--card);border:1px solid var(--bdr);
  border-radius:var(--rsm);padding:14px 16px;
  transition:border-color .2s,transform .2s cubic-bezier(.34,1.2,.64,1);
}
.how-step:active{transform:scale(.99)}
.how-step-n{
  width:28px;height:28px;border-radius:50%;
  background:var(--acc);color:#07070E;
  font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:.82rem;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
}
.how-step-txt{font-size:.9375rem;color:var(--txt2);line-height:1.5;padding-top:3px}
.how-step-txt strong{color:var(--txt);display:block;margin-bottom:2px}

.img-slot{
  width:100%;border-radius:var(--r);overflow:hidden;
  position:relative;background:var(--card);
  border:1px dashed rgba(203,255,0,.22);
  margin-bottom:12px;
}
.img-slot img,.img-slot video{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:opacity .4s ease;
}
.img-slot-ph{
  position:absolute;inset:0;
  background:
    repeating-linear-gradient(0deg,rgba(255,255,255,.022) 0px,rgba(255,255,255,.022) 1px,transparent 1px,transparent 20px),
    repeating-linear-gradient(90deg,rgba(255,255,255,.022) 0px,rgba(255,255,255,.022) 1px,transparent 1px,transparent 20px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  pointer-events:none;
}
.img-slot-ph-ico{font-size:1.8rem;opacity:.35}
.img-slot-ph-lbl{
  font-size:.68rem;font-weight:600;color:var(--mut);
  letter-spacing:.08em;text-transform:uppercase;text-align:center;
  background:var(--elev);padding:4px 10px;border-radius:999px;
  border:1px solid var(--bdr);
}
.img-slot-hero{aspect-ratio:4/3}
.img-slot-wide{aspect-ratio:16/9}
.img-slot-square{aspect-ratio:1/1}
.img-slot-banner{aspect-ratio:3/1}

/* ── PAGE HEADER ───────────────────── */
.pg-head{padding:4px 20px 22px}
.pg-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.9rem;letter-spacing:-.04em;line-height:1.1;margin-bottom:6px}
.pg-sub{font-size:.9375rem;color:var(--txt2);line-height:1.55}
.step-bar{display:flex;gap:5px;padding:4px 20px 18px}
.step-seg{height:3px;border-radius:999px;background:var(--bdr-hi);flex:1;transition:all .35s ease}
.step-seg.on{background:var(--acc);flex:2.5;box-shadow:0 0 8px var(--acc-glow)}
.sec{padding:0 20px}
.sec-label{font-size:.68rem;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;margin-top:20px}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;margin-bottom:12px}

/* ── INPUTS ────────────────────────── */
.inp-grp{margin-bottom:16px}
label{display:block;font-size:.7rem;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
input[type=text],input[type=date],input[type=time]{
  width:100%;padding:15px 16px;border:1.5px solid var(--bdr-hi);border-radius:var(--rsm);
  font-size:1rem;color:var(--txt);background:var(--elev);outline:none;
  transition:border-color .18s,box-shadow .18s;-webkit-appearance:none;appearance:none;color-scheme:dark;
}
input:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-dim)}
input::placeholder{color:var(--mut)}

/* ── SLOT BUILDER ──────────────────── */
.slot{background:var(--elev);border:1px solid var(--bdr);border-radius:var(--rsm);padding:14px;margin-bottom:10px;animation:pgIn .25s ease both;transition:border-color .18s}
.slot:focus-within{border-color:var(--bdr-hi)}
.slot-num{font-size:.68rem;font-weight:700;color:var(--acc);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.slot-row{display:flex;gap:8px;align-items:center}
.slot-row input{flex:1;padding:12px 14px;font-size:.9375rem}
.btn-del{width:34px;height:34px;border-radius:50%;border:1px solid var(--bdr);background:transparent;color:var(--mut);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.btn-del:hover{border-color:var(--red);color:var(--red)}
.btn-add-slot{width:100%;padding:13px;border:1.5px dashed rgba(203,255,0,.2);border-radius:var(--rsm);background:var(--acc-dim);color:var(--acc);font-weight:600;font-size:.9375rem;cursor:pointer;transition:all .18s;margin-top:2px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-add-slot:hover{background:var(--acc-soft);border-color:rgba(203,255,0,.35)}
.btn-add-slot:disabled{opacity:.35;cursor:not-allowed}

/* ── BUTTONS ───────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;padding:16px 28px;border-radius:999px;font-size:1rem;font-weight:600;cursor:pointer;border:none;transition:all .2s ease;width:100%;line-height:1;position:relative;overflow:hidden;white-space:nowrap}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none!important}
.btn-primary{background:var(--acc);color:#07070E}
.btn-primary::after{content:'';position:absolute;top:0;left:-80%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:shimmer 2.8s ease infinite;pointer-events:none}
@keyframes shimmer{to{left:180%}}
.btn-primary:hover{background:#DAFF20;transform:translateY(-2px);box-shadow:0 10px 32px var(--acc-glow)}
.btn-primary:active{transform:translateY(0);box-shadow:none}
.btn-outline{background:transparent;color:var(--txt);border:1px solid var(--bdr-hi)}
.btn-outline:hover{background:var(--elev)}
.btn-ghost{background:transparent;color:var(--txt2);padding:14px;font-size:.9rem;border:none}
.btn-ghost:hover{color:var(--txt)}
.btn-wa{background:#25D366;color:#fff}
.btn-wa:hover{background:#1fc55e}
.btn-copy{background:var(--acc);color:#07070E;border:none;padding:7px 14px;border-radius:var(--rxs);font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;flex-shrink:0;transition:all .18s;white-space:nowrap}
.btn-copy:hover{background:#DAFF20}
.btn-copy.ok{background:var(--grn)}
.btn-spinner{width:18px;height:18px;border:2.5px solid rgba(7,7,14,.25);border-top-color:#07070E;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── OPT CARDS (respond) ───────────── */
.opt-card{background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--rsm);padding:16px 18px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:border-color .22s,background .22s,transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .22s;user-select:none;-webkit-user-select:none}
.opt-card:active{transform:scale(.975)}
.opt-card.sel{border-color:var(--grn);background:var(--grn-dim);transform:scale(1.015);box-shadow:0 6px 28px var(--grn-glow)}
.opt-ring{width:24px;height:24px;border-radius:50%;border:2px solid var(--bdr-hi);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .22s;color:transparent;font-size:.75rem}
.opt-card.sel .opt-ring{border-color:var(--grn);background:var(--grn);color:#07070E;animation:ringPop .3s cubic-bezier(.34,1.56,.64,1) both}
@keyframes ringPop{0%{transform:scale(.6)}100%{transform:scale(1)}}
.opt-label{font-weight:600;font-size:1rem;color:var(--txt);line-height:1.25}

/* ── LINK BOX ──────────────────────── */
.link-box{background:var(--acc-dim);border:1px solid rgba(203,255,0,.16);border-radius:var(--rsm);padding:13px 16px;display:flex;align-items:center;gap:12px;margin-bottom:10px}
.link-text{flex:1;font-size:.82rem;color:var(--acc);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── SHARE HERO ────────────────────── */
.share-hero{text-align:center;padding:28px 20px 22px}
.share-emoji{font-size:4rem;display:block;margin-bottom:14px;animation:bounceIn .55s cubic-bezier(.34,1.56,.64,1) both}
@keyframes bounceIn{0%{opacity:0;transform:scale(.5)}100%{opacity:1;transform:scale(1)}}

/* ── RESULTS ───────────────────────── */
.best-card{
  background:linear-gradient(135deg,#141E00,#0C1600);
  border:1px solid rgba(203,255,0,.22);
  border-radius:var(--r);padding:24px;margin-bottom:18px;
  position:relative;overflow:hidden;
  animation:bounceIn .5s cubic-bezier(.34,1.56,.64,1) both;
}
.best-card::after{content:'';position:absolute;top:-60px;right:-60px;width:160px;height:160px;background:radial-gradient(circle,var(--acc-glow) 0%,transparent 70%)}
.best-ew{font-size:.68rem;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.12em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.best-ew::before{content:'✦'}
.best-date{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.6rem;letter-spacing:-.03em;color:var(--txt);line-height:1.15;margin-bottom:10px}
.best-cnt{font-size:.9375rem;color:var(--txt2)}
.best-who{font-size:.82rem;color:var(--mut);margin-top:5px}
.res-row{padding:14px 0;border-bottom:1px solid var(--bdr)}
.res-row:last-child{border-bottom:none}
.res-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.res-date{font-weight:600;font-size:.95rem}
.res-cnt{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1.1rem;color:var(--acc)}
.res-track{height:3px;background:var(--elev);border-radius:999px;overflow:hidden}
.res-fill{height:100%;border-radius:999px;background:var(--acc);width:0;transition:width .75s cubic-bezier(.25,.46,.45,.94)}
.res-names{font-size:.8rem;color:var(--mut);margin-top:7px;line-height:1.4}

/* ── INVITE CARD ───────────────────── */
.invite-card{background:var(--elev);border:1px solid var(--bdr-hi);border-radius:var(--r);padding:16px 18px;margin-bottom:22px;display:flex;align-items:center;gap:14px}

function confetti(){
  const c=document.getElementById('cc');if(!c)return;
  const ctx=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
  const cols=['#CBFF00','#F0F0EA','#00E28A','#FF3B3B','#8B5CF6','#38BDF8'];
  const ps=Array.from({length:100},()=>({
    x:Math.random()*c.width,y:-20-Math.random()*80,
    w:Math.random()*10+4,h:Math.random()*16+6,
    r:Math.random()*360,rs:(Math.random()-.5)*8,
    vx:(Math.random()-.5)*5,vy:Math.random()*4+2,g:.1+Math.random()*.12,
    col:cols[Math.floor(Math.random()*cols.length)]
  }));
  let raf;
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    ps.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r*Math.PI/180);
      ctx.fillStyle=p.col;ctx.globalAlpha=Math.max(0,1-p.y/(c.height*.88));
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.r+=p.rs;
    });
    if(ps.some(p=>p.y<c.height+100))raf=requestAnimationFrame(draw);
    else ctx.clearRect(0,0,c.width,c.height);
  }
  draw();
  setTimeout(()=>{cancelAnimationFrame(raf);ctx.clearRect(0,0,c.width,c.height);},5000);
}

  if(!opts.length)return;
  const targets=[90,32,60],seq=[0,2,1],totals=[3,1,2];
  function cycle(){
    opts.forEach(o=>o.classList.remove('hot'));
    bars.forEach(b=>{b.style.transition='none';b.style.width='0%'});
    cnts.forEach(c=>c.textContent='0');
    seq.forEach((idx,step)=>{
      setTimeout(()=>{
        opts[idx].classList.add('hot');
        setTimeout(()=>{
          bars[idx].style.transition='width .75s cubic-bezier(.25,.46,.45,.94)';
          bars[idx].style.width=targets[idx]+'%';
          countUp(cnts[idx],totals[idx],700);

    });

  cycle();_pvLoop=setInterval(cycle,5000);
}

// ════════════════════════════════════════
// VIEW: CREATE
// ════════════════════════════════════════
function initCreate(){_slots=[{id:uid(),date:'',time:''},{id:uid(),date:'',time:''}];go('create')}

function vCreate(){
  if(!_slots.length)initCreate();
  return`
  ${nav()}
  <button class="back-btn" onclick="go('')">${t('back')}</button>
  <div class="step-bar"><div class="step-seg on"></div><div class="step-seg on"></div><div class="step-seg on"></div></div>
  <div class="pg-head sa1">
    <div class="pg-title">${t('create_t')}</div>
    <div class="pg-sub">${t('create_s')}</div>
  </div>
  <div class="sec">
    ${!isDB?`<div class="cfg-warn">${t('cfg')}</div>`:''}
    <div id="ce"></div>
    <div class="inp-grp sa2">
      <label>${t('p_l')}</label>
      <input type="text" id="it" placeholder="${t('p_ph')}" maxlength="80">
    </div>
    <div class="inp-grp sa3">
      <label>${t('n_l')}</label>
      <input type="text" id="in2" placeholder="${t('n_ph')}" maxlength="40">
    </div>
    <div class="inp-grp sa4">
      <label>${I.clk} ${t('o_l')}</label>
      <div id="sl">${_slots.map((s,k)=>slotH(s,k)).join('')}</div>
      <button class="btn-add-slot" id="ab" onclick="addSlot()" ${_slots.length>=6?'disabled':''}>${I.plus} ${t('add')}</button>
    </div>
    <div style="height:14px"></div>
    <button class="btn btn-primary sa5" id="gb" onclick="createPlan()">${I.clk} ${t('gen')}</button>
  </div>
  <div class="powered" style="margin:32px 20px 0">
    <img class="powered-logo" src="img/tropix.png" alt="" onerror="this.style.display='none'">
    ${t('powered')}
  </div>`;
}

function slotH(s,k){
  return`<div class="slot" id="sc-${s.id}">
    <div class="slot-num">${t('sn')(k+1)}</div>
    <div class="slot-row">
      <input type="date" value="${s.date}" oninput="upS('${s.id}','date',this.value)">
      <input type="time" value="${s.time}" oninput="upS('${s.id}','time',this.value)">
      ${_slots.length>2?`<button class="btn-del" onclick="rmS('${s.id}')">×</button>`:''}
    </div>
  </div>`;
}
function addSlot(){
  if(_slots.length>=6)return;
  const s={id:uid(),date:'',time:''};_slots.push(s);
  document.getElementById('sl').insertAdjacentHTML('beforeend',slotH(s,_slots.length-1));
  if(_slots.length>=6){const ab=document.getElementById('ab');if(ab)ab.disabled=true;}
}
function rmS(id){
  _slots=_slots.filter(x=>x.id!==id);
  document.getElementById('sc-'+id)?.remove();
  document.querySelectorAll('.slot-num').forEach((el,k)=>el.textContent=t('sn')(k+1));
  const ab=document.getElementById('ab');if(ab)ab.disabled=false;
  if(_slots.length<=2)document.querySelectorAll('.btn-del').forEach(b=>b.remove());
}
function upS(id,f,v){const s=_slots.find(x=>x.id===id);if(s)s[f]=v}

// ── DEMO FALLBACK HELPERS ────────────────
function saveDemoAndGo(payload){
  const id='demo-'+uid();
  sessionStorage.setItem('p:'+id,JSON.stringify({...payload,id}));
  _slots=[];go('share/'+id);
}

async function createPlan(){
  const title=document.getElementById('it')?.value.trim();
  const creator=document.getElementById('in2')?.value.trim();
  const ee=document.getElementById('ce');const gb=document.getElementById('gb');
  if(ee)ee.innerHTML='';
  if(!title||!creator){if(ee)ee.innerHTML=`<div class="err-msg">${t('ef')}</div>`;return;}
  const valid=_slots.filter(x=>x.date&&x.time);
  if(valid.length<2){if(ee)ee.innerHTML=`<div class="err-msg">${t('eo')}</div>`;return;}
  if(gb){gb.innerHTML='<span class="btn-spinner"></span>';gb.disabled=true;}
  const payload={title,creator_name:creator,options:valid.map(x=>({id:x.id,date:x.date,time:x.time}))};

  // No real DB → go straight to demo mode
  if(!isDB){
    await new Promise(r=>setTimeout(r,600));
    saveDemoAndGo(payload);
    return;
  }

  // Try Supabase — fall back to demo on any error
  try{
    const{data,error}=await db.from('plans').insert(payload).select().single();
    if(error)throw error;
    _slots=[];go('share/'+data.id);
  }catch(e){
    console.warn('Supabase insert failed, falling back to demo mode:', e);
    // Silently fall back — user still gets a working link stored in sessionStorage
    saveDemoAndGo(payload);
  }
}

// ════════════════════════════════════════
// VIEW: RESPOND
// ════════════════════════════════════════
async function vRespond(id){
  _plan=await getPlan(id);_sel=new Set();
  const ini=_plan.creator_name.charAt(0).toUpperCase();
  return`
  ${nav()}
  <div class="sec">
    <div class="invite-card sa1">
      <div class="invite-av">${ini}</div>
      <div>
        <div class="invite-from">${_plan.creator_name} ${t('ifr')}</div>
        <div class="invite-plan">${_plan.title}</div>
      </div>
    </div>
    <div class="pg-title sa2">${t('rt')}</div>
    <div class="pg-sub sa3" style="margin-bottom:20px">${t('rs')}</div>
    <div id="re"></div>
    ${_plan.options.map((o,k)=>`
      <div class="opt-card sa${Math.min(k+4,6)}" data-id="${o.id}" onclick="togOpt('${o.id}',this)">
        <div class="opt-ring">${I.chk}</div>
        <div class="opt-label">${fmt(o.date,o.time)}</div>
      </div>`).join('')}
    <div class="inp-grp sa5" style="margin-top:24px">
      <label>${t('n_l')}</label>
      <input type="text" id="rn" placeholder="${t('n_ph')}" maxlength="40">
    </div>
    <button class="btn btn-primary sa6" id="cb" onclick="submitR()">${I.chk} ${t('cf')}</button>
  </div>
  <div class="powered" style="margin:32px 20px 0">
    <img class="powered-logo" src="img/tropix.png" alt="" onerror="this.style.display='none'">
    ${t('powered')}
  </div>`;
}

function togOpt(id,el){haptic();_sel.has(id)?_sel.delete(id):_sel.add(id);el.classList.toggle('sel',_sel.has(id))}

async function submitR(){
  const name=document.getElementById('rn')?.value.trim();
  const ee=document.getElementById('re');const cb=document.getElementById('cb');
  if(ee)ee.innerHTML='';
  if(!name){if(ee)ee.innerHTML=`<div class="err-msg">${t('ef')}</div>`;return;}
  if(cb){cb.innerHTML='<span class="btn-spinner"></span>';cb.disabled=true;}
  const data={plan_id:_plan.id,name,selected:[..._sel]};

  // Demo plan or no DB → use sessionStorage
  if(_plan.id.startsWith('demo-')||!isDB){
    await new Promise(r=>setTimeout(r,500));
    const arr=JSON.parse(sessionStorage.getItem('r:'+_plan.id)||'[]');
    arr.push(data);sessionStorage.setItem('r:'+_plan.id,JSON.stringify(arr));
    toast(t('saved'));setTimeout(()=>go('results/'+_plan.id),900);return;
  }

  try{
    const{error}=await db.from('responses').insert(data);
    if(error)throw error;
    toast(t('saved'));setTimeout(()=>go('results/'+_plan.id),900);
  }catch(e){
    console.warn('Supabase response insert failed, using local fallback:', e);
    // Fallback: store locally and redirect
    const arr=JSON.parse(sessionStorage.getItem('r:'+_plan.id)||'[]');
    arr.push(data);sessionStorage.setItem('r:'+_plan.id,JSON.stringify(arr));
    toast(t('saved'));setTimeout(()=>go('results/'+_plan.id),900);
  }
}

// ════════════════════════════════════════
// VIEW: RESULTS
// ════════════════════════════════════════
async function vResults(id){
  _plan=await getPlan(id);
  let responses=[];

  if(id.startsWith('demo-')||!isDB){
    responses=JSON.parse(sessionStorage.getItem('r:'+id)||'[]');
  }else{
    try{
      const{data,error}=await db.from('responses').select('*').eq('plan_id',id).order('created_at');
      if(error)throw error;
      responses=data||[];
    }catch(e){
      console.warn('Could not load responses from DB, using local:', e);
      responses=JSON.parse(sessionStorage.getItem('r:'+id)||'[]');
    }
  }

  const cnt={},nms={};
  _plan.options.forEach(o=>{cnt[o.id]=0;nms[o.id]=[];});
  responses.forEach(r=>(r.selected||[]).forEach(x=>{if(cnt[x]!==undefined){cnt[x]++;nms[x].push(r.name);}}));
  const sorted=[..._plan.options].sort((a,b)=>cnt[b.id]-cnt[a.id]);
  const best=sorted[0],maxC=Math.max(...Object.values(cnt),1);
  const pl=`${base()}#plan/${id}`,hasBest=responses.length>0&&cnt[best?.id]>0;
  if(hasBest)setTimeout(confetti,500);
  if(!id.startsWith('demo-')&&isDB)_ri=setInterval(()=>aV(()=>vResults(id)),14000);

  return`
  ${nav()}
  <button class="back-btn" onclick="go('')">${t('back')}</button>
  <div class="sec">
    <div class="pg-title sa1">${_plan.title}</div>
    <div class="sa2" style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
      <span style="font-size:.85rem;color:var(--mut)">${responses.length} ${t('nr')}</span>
      <button onclick="aV(()=>vResults('${id}'))"
        style="background:none;border:none;color:var(--acc);font-size:.85rem;font-weight:600;cursor:pointer;padding:0;display:flex;align-items:center;gap:5px">
        ${I.clk} ${t('rf')}
      </button>
    </div>

    ${responses.length===0?`
      <div style="text-align:center;padding:48px 20px">
        <div style="font-size:3.5rem;margin-bottom:16px;opacity:.5">🕐</div>
        <div style="color:var(--txt2);margin-bottom:22px">${t('nor')}</div>
        <button class="btn btn-wa" style="max-width:300px" onclick="waShare('${pl}')">${I.wa} ${t('wa')}</button>
      </div>
    `:`
      ${hasBest?`
        <div class="best-card sa2">
          <div class="best-ew">${t('bl')}</div>
          <div class="best-date">${fmt(best.date,best.time)}</div>
          <div class="best-cnt">${t('np')(cnt[best.id])}</div>
          ${nms[best.id].length?`<div class="best-who">${nms[best.id].join(' · ')}</div>`:''}
        </div>
      `:''}
      <div class="sec-label">${t('as')}</div>
      <div class="card sa3">
        ${sorted.map(o=>`
          <div class="res-row">
            <div class="res-top">
              <div class="res-date">${fmt(o.date,o.time)}</div>
              <div class="res-cnt" data-cu="${cnt[o.id]}">0</div>
            </div>
            <div class="res-track"><div class="res-fill" data-w="${Math.round(cnt[o.id]/maxC*100)}%"></div></div>
            ${nms[o.id].length?`<div class="res-names">${nms[o.id].join(' · ')}</div>`:''}
          </div>`).join('')}
      </div>
    `}

    ${imgSlot('img/results.jpg','Results visual','img-slot-banner','🏆')}

    <button class="btn btn-wa sa4" onclick="waShare('${pl}')" style="margin-bottom:10px">${I.wa} ${t('sa')}</button>
    <button class="btn btn-outline sa5" onclick="initCreate()">${t('more')}</button>
  </div>
  <div class="powered" style="margin:24px 20px 0">
    <img class="powered-logo" src="img/tropix.png" alt="" onerror="this.style.display='none'">
    ${t('powered')}
  </div>`;
}

// ── DATA ──────────────────────────────────
async function getPlan(id){
  // Always check sessionStorage first (covers demo plans + fallback plans)
  const cached=sessionStorage.getItem('p:'+id);
  if(cached)return JSON.parse(cached);

  if(!isDB)throw new Error('Plan not found');

  try{
    const{data,error}=await db.from('plans').select('*').eq('id',id).single();
    if(error)throw error;
    return data;
  }catch(e){
    throw new Error('Plan not found');
  }
}
</script>
